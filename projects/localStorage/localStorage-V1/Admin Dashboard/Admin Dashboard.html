<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة وعرض المنتجات</title>
    <style>
        /* CSS مشترك */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #333;
        }

        h1 {
            text-align: center;
            margin: 20px 0;
            color: #d63384;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            background-color: #d63384;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        .folder-gallery, .product-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .folder-item, .product-item {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
            padding: 10px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #343a40;
            color: white;
        }
    </style>
</head>
<body>
    <h1>إدارة وعرض المنتجات</h1>

    <div class="container">
        <h2>إضافة ملف جديد</h2>
        <form id="folderForm">
            <div class="form-group">
                <label for="folderName">اسم الملف:</label>
                <input type="text" id="folderName" required>
            </div>
            <div class="form-group">
                <label for="folderImage">رابط الصورة:</label>
                <input type="text" id="folderImage" required>
            </div>
            <button type="submit">إضافة ملف</button>
        </form>

        <h2>إضافة منتج جديد</h2>
        <form id="productForm">
            <div class="form-group">
                <label for="productName">اسم المنتج:</label>
                <input type="text" id="productName" required>
            </div>
            <div class="form-group">
                <label for="productPrice">السعر:</label>
                <input type="text" id="productPrice" required>
            </div>
            <div class="form-group">
                <label for="productImages">روابط الصور (مفصولة بفاصلة):</label>
                <textarea id="productImages" required></textarea>
            </div>
            <div class="form-group">
                <label for="productFolder">اسم الملف:</label>
                <input type="text" id="productFolder" required>
            </div>
            <button type="submit">إضافة منتج</button>
        </form>
    </div>

    <div class="folder-gallery" id="folderGallery"></div>
    <div class="product-gallery" id="productGallery" style="display: none;"></div>

    <footer>
        <p>© 2024 إدارة وعرض المنتجات</p>
    </footer>

    <script>
        const folders = JSON.parse(localStorage.getItem('folders')) || [];
        const products = JSON.parse(localStorage.getItem('products')) || [];

        // عرض الملفات
        function renderFolders() {
            const folderGallery = document.getElementById('folderGallery');
            folderGallery.innerHTML = folders.map(folder => `
                <div class="folder-item" onclick="showProducts('${folder.name}')">
                    <img src="${folder.image}" alt="${folder.name}" style="width: 100%; height: 150px; object-fit: cover;">
                    <p>${folder.name}</p>
                </div>
            `).join('');
        }

        // عرض المنتجات حسب الملف
        function showProducts(folderName) {
            const productGallery = document.getElementById('productGallery');
            productGallery.style.display = 'grid';
            const folderProducts = products.filter(product => product.folder === folderName);
            productGallery.innerHTML = folderProducts.map(product => `
                <div class="product-item">
                    <img src="${product.images[0]}" alt="${product.name}" style="width: 100%; height: 150px; object-fit: cover;">
                    <p>${product.name}</p>
                    <p>${product.price}</p>
                </div>
            `).join('');
        }

        // إضافة ملف
        document.getElementById('folderForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const folderName = document.getElementById('folderName').value;
            const folderImage = document.getElementById('folderImage').value;
            folders.push({ name: folderName, image: folderImage });
            localStorage.setItem('folders', JSON.stringify(folders));
            renderFolders();
        });

        // إضافة منتج
        document.getElementById('productForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const productName = document.getElementById('productName').value;
            const productPrice = document.getElementById('productPrice').value;
            const productImages = document.getElementById('productImages').value.split(',');
            const productFolder = document.getElementById('productFolder').value;
            products.push({ name: productName, price: productPrice, images: productImages, folder: productFolder });
            localStorage.setItem('products', JSON.stringify(products));
        });

        // بدء العرض
        renderFolders();
    </script>
</body>
</html>
