<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأعياد القادمة</title>

    <!-- الخطوط والأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- ملفات التنسيق -->
    <link rel="stylesheet" href="assets/css/main.css">
    <!-- التنسيقات الخاصة بصفحة الأعياد القادمة (سيتم دمجها في main.css، لكن يمكن وضعها هنا مؤقتاً) -->
    <style>
        /* تنسيقات إضافية خاصة بصفحة الأعياد القادمة */
        .upcoming-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .range-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .range-selector select {
            padding: 8px 15px;
            border-radius: 30px;
            border: 2px solid var(--primary-color);
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            background: var(--card-bg);
            color: var(--text-color);
        }
        .days-remaining {
            font-weight: bold;
            color: var(--primary-color);
        }
        .urgent {
            color: var(--danger-color);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        .countdown-timer {
            font-family: monospace;
            direction: ltr;
            display: inline-block;
            background: rgba(67, 97, 238, 0.1);
            padding: 4px 8px;
            border-radius: 20px;
        }
        .back-btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(67, 97, 238, 0.3);
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.4);
        }
        .back-btn i {
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="upcoming-header">
            <h1><i class="fas fa-gift"></i> أعياد الميلاد القادمة</h1>
            <div class="range-selector">
                <label for="range">عرض خلال:</label>
                <select id="range">
                    <option value="7">7 أيام</option>
                    <option value="30" selected>30 يوم</option>
                    <option value="90">90 يوم</option>
                    <option value="365">سنة كاملة</option>
                </select>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>تاريخ الميلاد</th>
                        <th>العمر القادم</th>
                        <th>الأيام المتبقية</th>
                        <th>العد التنازلي</th> <!-- العمود الجديد -->
                        <th>التصنيف</th>
                    </tr>
                </thead>
                <tbody id="upcomingTable">
                    <tr>
                        <td colspan="6" class="empty-message">
                            <i class="fas fa-calendar-check"></i>
                            جاري التحميل...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/upcoming.js"></script>
</body>
</html>
